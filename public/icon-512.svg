<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#BFDBFE"/>
    </linearGradient>
    <filter id="gshadow">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#1E3A8A" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="3" y="3" width="506" height="506" rx="94" fill="none" stroke="#93C5FD" stroke-width="2" opacity="0.5"/>

  <!--
    G ring: thick stroked circular arc with a gap on the right side.
    Center (240,256), stroke radius 126, stroke-width 60
    → outer edge 186 from center, inner edge 96 from center.

    Full circumference = 2π×126 = 791.7px
    Gap angle = 104° → gap length = 104/360 × 791.7 = 228.5px
    Arc length = 791.7 − 228.5 = 563.2px

    rotate(52°) shifts the arc start to 52° CW so the gap is centred on the right.
  -->
  <g filter="url(#gshadow)">
    <circle
      cx="240" cy="256" r="126"
      fill="none"
      stroke="#1B4FD8"
      stroke-width="60"
      stroke-dasharray="563.2 228.5"
      stroke-linecap="butt"
      transform="rotate(52, 240, 256)"
    />

    <!-- Crossbar: spans from inner edge (240+96=336) to outer edge (240+186=426), centred at y=256, height=48 -->
    <rect x="331" y="232" width="100" height="48" fill="#1B4FD8"/>
  </g>

  <!-- "travels" italic serif, centred at G centre, sitting at crossbar level -->
  <text
    x="240"
    y="268"
    font-family="'Georgia', 'Palatino Linotype', serif"
    font-size="38"
    font-weight="400"
    font-style="italic"
    letter-spacing="4"
    text-anchor="middle"
    fill="white"
    opacity="0.95"
  >travels</text>

  <!-- Airplane emoji bottom-right -->
  <text
    x="418"
    y="440"
    font-size="68"
    text-anchor="middle"
    dominant-baseline="middle"
  >✈</text>

</svg>
