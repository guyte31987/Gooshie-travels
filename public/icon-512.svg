<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#BFDBFE"/>
    </linearGradient>
    <filter id="gshadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1E3A8A" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="3" y="3" width="506" height="506" rx="94" fill="none" stroke="#93C5FD" stroke-width="2" opacity="0.5"/>

  <!--
    G shape: annular arc with crossbar
    Center: (245, 252)
    Outer radius: 158, Inner radius: 98
    Gap on right side: ±52°
    cos52=0.6157  sin52=0.7880

    Outer arc points:
      Top gap (angle -52°): 245+158*0.6157, 252-158*0.7880 = 342.3, 127.5 → 342,128
      Bot gap (angle +52°): 342, 376

    Inner arc points:
      Top gap: 245+98*0.6157, 252-98*0.7880 = 305.3, 174.8 → 305,175
      Bot gap: 305,329
  -->
  <g filter="url(#gshadow)">
    <!-- Annular G body: outer arc CCW then inner arc CW -->
    <path d="
      M 342,128
      A 158,158 0 1 0 342,376
      L 305,329
      A 98,98  0 1 1 305,175
      Z
    " fill="#1B4FD8"/>

    <!-- Crossbar: from inner edge (x=305) to outer edge (x=342), vertically centred at y=252, height 46 -->
    <rect x="300" y="229" width="47" height="46" fill="#1B4FD8"/>
  </g>

  <!-- "travels" — elegant thin caps, sitting right on the crossbar midline -->
  <text
    x="245"
    y="261"
    font-family="'Georgia', 'Palatino', 'Times New Roman', serif"
    font-size="36"
    font-weight="400"
    font-style="italic"
    letter-spacing="5"
    text-anchor="middle"
    fill="white"
    opacity="0.95"
  >travels</text>

  <!-- Airplane emoji bottom-right corner -->
  <text
    x="430"
    y="445"
    font-size="62"
    text-anchor="middle"
    dominant-baseline="middle"
  >✈</text>

</svg>
